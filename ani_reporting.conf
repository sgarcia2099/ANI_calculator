# ANI reporting defaults for ANI_script.sh
#
# Values from this file are loaded automatically when present in the same
# directory as ANI_script.sh, or can be supplied explicitly with -c.

# FastANI container and runtime
DOCKER_IMAGE="staphb/fastani:1.34"
THREADS="1"

# Thresholds used to decide whether a numeric ANI should be reported
MIN_ANI="80.0"
MIN_ALIGNMENT_FRACTION="0.20"
MIN_MAPPED_FRAGMENTS="50"

# Action when a pair fails one or more thresholds:
#   keep -> keep ANI value as reported by FastANI
#   na   -> replace ANI with NA_VALUE
#   drop -> omit pair from long table (matrix cell becomes NA_VALUE)
BELOW_THRESHOLD_ACTION="na"

# Placeholder written for missing/filtered ANI
NA_VALUE="NA"
